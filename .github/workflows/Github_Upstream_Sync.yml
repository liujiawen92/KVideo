name: Upstream Sync

permissions:
  contents: write
  pull-requests: write

env:
  UPSTREAM_REPO: KuekHaoYang/KVideo
  UPSTREAM_BRANCH: main
  TARGET_BRANCH: main
  SYNC_BRANCH: upstream-sync-conflict

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync and Merge (with PR Fallback)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Configure Git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 2. Add Upstream Remote
          git remote add upstream "https://github.com/$UPSTREAM_REPO.git"
          git fetch upstream

          # 3. Check if already up to date
          MERGE_BASE=$(git merge-base HEAD upstream/$UPSTREAM_BRANCH)
          UPSTREAM_LATEST=$(git rev-parse upstream/$UPSTREAM_BRANCH)
          
          if [ "$MERGE_BASE" = "$UPSTREAM_LATEST" ]; then
            echo "Already up to date with upstream."
            exit 0
          fi

          # 4. Try to merge (without committing)
          git merge upstream/$UPSTREAM_BRANCH --no-commit --no-ff || true
          
          # 5. Remove .github/ changes to avoid GitHub App workflows permission error
          # (GitHub App cannot push workflow files without workflows:write permission)
          HAS_GITHUB=$(git diff --name-only --cached | grep "^.github/" | head -1 || echo "")
          if [ -n "$HAS_GITHUB" ]; then
            echo "Detected .github/ changes from upstream. Restoring to avoid workflows permission issue."
            git restore --source=HEAD -- .github/
            git reset HEAD -- .github/ 2>/dev/null || true
          fi
          
          # 6. Check remaining changes
          REMAINING=$(git diff --name-only --cached | head -1 || git diff --name-only | head -1 || echo "")
          if [ -n "$REMAINING" ]; then
            echo "Staging remaining changes..."
            git add -A
            if git commit -m "chore: sync from upstream $(git rev-parse --short upstream/$UPSTREAM_BRANCH)"; then
              echo "Merge successful. Pushing changes..."
              git push origin $TARGET_BRANCH
            fi
          else
            echo "No remaining changes after removing .github/. Already up to date."
          fi

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 3
