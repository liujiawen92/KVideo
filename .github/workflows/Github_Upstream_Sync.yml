name: Upstream Sync

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}
    permissions:
      contents: write
      pull-requests: write
      workflows: write

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync and Merge (with PR Fallback)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Configure Git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 2. Add Upstream Remote
          git remote add upstream "https://github.com/$UPSTREAM_REPO.git"
          git fetch upstream

          # 3. Check if already up to date
          MERGE_BASE=$(git merge-base HEAD upstream/$UPSTREAM_BRANCH)
          UPSTREAM_LATEST=$(git rev-parse upstream/$UPSTREAM_BRANCH)
          
          if [ "$MERGE_BASE" = "$UPSTREAM_LATEST" ]; then
            echo "Already up to date with upstream."
            exit 0
          fi

          # 4. Try to merge (without committing)
          if git merge upstream/$UPSTREAM_BRANCH --no-commit --no-ff; then
            echo "Merge successful (no conflicts)."
          else
            echo "Merge with conflicts. Committing resolution..."
            git checkout --ours .
          fi
          
          # 5. Check remaining changes
          REMAINING=$(git diff --name-only --cached | head -1 || git diff --name-only | head -1 || echo "")
          if [ -n "$REMAINING" ]; then
            echo "Staging remaining changes..."
            git add -A
            if git commit -m "chore: sync from upstream $(git rev-parse --short upstream/$UPSTREAM_BRANCH)"; then
              echo "Pushing changes..."
              git push origin main
            fi
          else
            echo "No remaining changes. Already up to date."
          fi

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 3

env:
  UPSTREAM_REPO: KuekHaoYang/KVideo
  UPSTREAM_BRANCH: main
