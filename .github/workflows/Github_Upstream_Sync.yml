name: Upstream Sync

permissions:
  contents: write
  pull-requests: write

env:
  UPSTREAM_REPO: KuekHaoYang/KVideo
  UPSTREAM_BRANCH: main
  TARGET_BRANCH: main
  SYNC_BRANCH: upstream-sync-conflict

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync and Merge (with PR Fallback)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Configure Git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 2. Add Upstream Remote
          git remote add upstream "https://github.com/$UPSTREAM_REPO.git"
          git fetch upstream

          # 3. Check for merge conflict (without actually merging)
          MERGE_BASE=$(git merge-base HEAD upstream/$UPSTREAM_BRANCH)
          UPSTREAM_LATEST=$(git rev-parse upstream/$UPSTREAM_BRANCH)
          
          if [ "$MERGE_BASE" = "$UPSTREAM_LATEST" ]; then
            echo "✅ Already up to date with upstream."
            exit 0
          fi

          # 4. Try merge without committing
          git merge upstream/$UPSTREAM_BRANCH --no-commit --no-ff || true
          
          # 5. Check if there are changes to .github/ directory
          if git diff --name-only | grep -q "^.github/"; then
            echo "⚠️ Upstream contains .github/ changes (workflow files). Removing them to avoid permissions issue..."
            git restore --source=HEAD -- .github/
          fi
          
          # 6. Check if there are any remaining changes
          if git diff --name-only --cached | grep -q .; then
            # Stage remaining changes
            git add -A
            # Try to commit
            if git commit -m "chore: sync from upstream $UPSTREAM_BRANCH"; then
              echo "✅ Merge successful. Pushing changes..."
              git push origin $TARGET_BRANCH
            else
              echo "ℹ️ No changes to commit (only .github/ was modified). Skipping push."
            fi
          else
            echo "ℹ️ No changes after removing .github/. Already up to date."
          fi

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 3
