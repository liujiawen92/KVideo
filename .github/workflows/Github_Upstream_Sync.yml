name: Upstream Sync

permissions:
  contents: write
  pull-requests: write

env:
  UPSTREAM_REPO: KuekHaoYang/KVideo
  UPSTREAM_BRANCH: main
  TARGET_BRANCH: main
  SYNC_BRANCH: upstream-sync-conflict

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync and Merge (with PR Fallback)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -x
          
          # 1. Configure Git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 2. Add Upstream Remote
          git remote add upstream "https://github.com/$UPSTREAM_REPO.git"
          git fetch upstream

          # 3. Check merge status
          MERGE_BASE=$(git merge-base HEAD upstream/$UPSTREAM_BRANCH)
          UPSTREAM_LATEST=$(git rev-parse upstream/$UPSTREAM_BRANCH)
          
          echo "MERGE_BASE=$MERGE_BASE"
          echo "UPSTREAM_LATEST=$UPSTREAM_LATEST"
          
          if [ "$MERGE_BASE" = "$UPSTREAM_LATEST" ]; then
            echo "Already up to date with upstream."
            exit 0
          fi

          # 4. Try to merge
          git merge upstream/$UPSTREAM_BRANCH --no-commit --no-ff || true
          
          # 5. Show what changed
          echo "Changed files:"
          git diff --name-only --cached || git diff --name-only
          
          # 6. Check for .github/ changes and remove them
          HAS_GITHUB=$(git diff --name-only --cached | grep "^.github/" | head -1 || echo "")
          if [ -n "$HAS_GITHUB" ]; then
            echo "Detected .github/ changes: $HAS_GITHUB"
            echo "Restoring to avoid workflows permission issue..."
            git restore --source=HEAD -- .github/
            git diff --cached -- .github/ > /dev/null 2>&1 && git reset HEAD -- .github/ || true
          fi
          
          # 7. Check remaining changes
          REMAINING=$(git diff --name-only --cached | head -1 || git diff --name-only | head -1 || echo "")
          if [ -n "$REMAINING" ]; then
            echo "Remaining changes: $REMAINING"
            git add -A
            if git commit -m "chore: sync from upstream $(git rev-parse --short upstream/$UPSTREAM_BRANCH)"; then
              echo "Merge successful. Pushing..."
              git push origin $TARGET_BRANCH || echo "Push failed - checking if only workflow files were modified"
            fi
          else
            echo "No remaining changes after removing .github/. Already up to date."
          fi

