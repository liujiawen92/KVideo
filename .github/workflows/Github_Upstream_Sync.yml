name: Upstream Sync

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync and Merge (with REST API fallback for workflows)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          
          # 1. Configure Git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 2. Add Upstream Remote
          git remote add upstream "https://github.com/$UPSTREAM_REPO.git"
          git fetch upstream

          # 3. Check if already up to date
          MERGE_BASE=$(git merge-base HEAD upstream/$UPSTREAM_BRANCH)
          UPSTREAM_LATEST=$(git rev-parse upstream/$UPSTREAM_BRANCH)
          
          if [ "$MERGE_BASE" = "$UPSTREAM_LATEST" ]; then
            echo "Already up to date with upstream."
            exit 0
          fi

          # 4. Try to merge
          if git merge upstream/$UPSTREAM_BRANCH --no-commit --no-ff; then
            echo "Merge successful (no conflicts)."
          else
            echo "Merge with conflicts. Committing resolution..."
            git checkout --ours .
          fi
          
          # 5. Check for .github/ changes - handle workflow files via REST API
          HAS_GITHUB=$(git diff --name-only --cached | grep "^.github/" || git diff --name-only | grep "^.github/" || echo "")
          
          if [ -n "$HAS_GITHUB" ]; then
            echo "Detected .github/ changes (including workflow files)."
            
            # For each workflow file changed by upstream, update via REST API
            for wf in $(git diff --name-only --cached | grep "^.github/workflows/" || git diff --name-only | grep "^.github/workflows/"); do
              echo "Updating workflow file via API: $wf"
              # Get file content from staged area
              CONTENT=$(git show ":$wf" 2>/dev/null | base64)
              SHA_WF=$(curl -s -H "Authorization: token $GH_TOKEN" \
                "https://api.github.com/repos/$REPO/contents/$wf" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('sha',''))")
              if [ -n "$SHA_WF" ]; then
                curl -s -X PUT \
                  -H "Authorization: token $GH_TOKEN" \
                  -H "Content-Type: application/json" \
                  "https://api.github.com/repos/$REPO/contents/$wf" \
                  -d "{\"message\":\"chore: sync workflow from upstream\",\"sha\":\"$SHA_WF\",\"content\":\"$CONTENT\"}" \
                  && echo " ✓ Updated $wf via API"
              fi
            done
            
            # Remove .github/ from staging (already handled via API)
            git restore --staged -- .github/ 2>/dev/null || git reset HEAD -- .github/ 2>/dev/null || true
          fi
          
          # 6. Commit and push remaining (non-workflow) changes
          REMAINING=$(git diff --name-only --cached | head -1 || git diff --name-only | head -1 || echo "")
          if [ -n "$REMAINING" ]; then
            git add -A
            if git commit -m "chore: sync from upstream $(git rev-parse --short upstream/$UPSTREAM_BRANCH)"; then
              echo "Pushing code changes..."
              git push origin main
            fi
          else
            echo "No remaining code changes."
          fi

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 3

env:
  UPSTREAM_REPO: KuekHaoYang/KVideo
  UPSTREAM_BRANCH: main
